baseURL = "https://hanbinzheng.github.io/"
title = "Hanbin Zheng"
languageCode = "en-us"
theme = "PaperMod"
publishDir = "public"

[pagination]
  pagerSize = 10

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  math = true

  [params.profileMode]
    enabled = true
    title = "Hanbin Zheng"
    subtitle = "ECE • ML/Systems • Marathon"
    imageUrl = "avatar.jpg"
    imageWidth = 120
    imageHeight = 120
    buttons = [
      { name = "Blog", url = "/posts/" },
      { name = "Projects", url = "/projects/" },
      { name = "About", url = "/about/" }
    ]

  [params.social]
    github = "hanbinzheng"

[[menu.main]]
  name = "Blog"
  url = "/posts/"
  weight = 10

[[menu.main]]
  name = "Projects"
  url = "/projects/"
  weight = 20

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 30

